<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title></title>
    <script src="js/dama.js"></script>
    <style>
        body {
            font-size: 16px;
        }
        
        p {
            margin: 0;
            padding: 5px;
        }
        
        .yes {
            color: #FFF;
            background-color: rgb(51.2, 126.4, 204);
        }
    </style>
    <script type="text/javascript">
        document.addEventListener('plusready', function() {
            //console.log("所有plus api都应该在此事件发生后调用，否则会出现plus is undefined。")

        });
    </script>
</head>

<body>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <div id="damas" style="padding: 1px 2px;">
    </div>

    <script>
        localStorage.setItem("myname", "jutleo");
        alert(localStorage.getItem("myname"))
        var getWTHTML = function(dama) {
            return '<div style="padding:15px 0">' + dama.sno + '、' + dama.wt + '</div>';
        };
        var getXXHTML = function(dama) {
            var xxArray = [];
            xxArray.push('<div id="xx_' + dama.sno + '">');
            for (var x = 0, xLne = dama.xx.length; x < xLne; x++) {
                if ((dama.sy || dama.sy === 'true') && dama.xx[x] === dama.da) {
                    xxArray.push('<p onclick="selectItemAction(' + dama.sno + ')" class="yes">' + dama.xx[x] + '</p>');
                } else {
                    xxArray.push('<p onclick="selectItemAction(' + dama.sno + ')">' + dama.xx[x] + '</p>');
                }
            }
            xxArray.push('</div>');
            return xxArray.join('');
        };
        var selectItemAction = function(sno) {
            var items = damas[sno - 1].xx;
            var itemArray = [];
            for (var y = 0; y < items.length; y++) {
                if (damas[sno - 1].da === items[y]) {
                    itemArray.push('<p class="yes">' + items[y] + '</p>');
                    localStorage.setItem("dama_sno_" + sno, true);
                } else {
                    itemArray.push('<p>' + items[y] + '</p>');
                }
            }
            document.getElementById('xx_' + sno).innerHTML = itemArray.join('');
        };

        var allHTML = [];

        for (var i = 0, iLen = damas.length; i < iLen; i++) {
            if (localStorage.getItem("dama_sno_" + (i + 1)) || localStorage.getItem("dama_sno_" + (i + 1)) === "true") {
                damas[i].sy = true;
            }
            allHTML.push('<div>');
            allHTML.push(getWTHTML(damas[i], i + 1));
            allHTML.push(getXXHTML(damas[i], i + 1));
            allHTML.push('</div>');
        }

        document.getElementById('damas').innerHTML = allHTML.join('');
    </script>
</body>

</html>
